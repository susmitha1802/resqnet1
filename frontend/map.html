<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQNet — Live Disaster Map</title>
  <meta name="description"
    content="Live interactive map showing disaster locations, help requests, and volunteer positions.">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="css/styles.css">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100dvh;
      overflow: hidden;
      background: #050b14;
    }

    #map {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .map-stats {
      position: fixed;
      top: 78px;
      left: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .map-legend {
      position: fixed;
      bottom: 36px;
      right: 16px;
      z-index: 500;
    }

    .map-filters {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      margin-left: auto;
    }

    /* Back to dashboard link */
    .map-back-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-subtle);
      background: var(--bg-glass);
      transition: var(--transition-sm);
    }

    .map-back-link:hover {
      color: var(--accent-red);
      border-color: var(--accent-red);
    }

    @keyframes ripple {
      0% {
        transform: scale(0);
        opacity: 0.8;
      }

      100% {
        transform: scale(4);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Top Bar -->
  <div class="map-topbar">
    <!-- Logo -->
    <div
      style="font-weight:700;font-size:1rem;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px;flex-shrink:0">
      <div
        style="width:28px;height:28px;background:var(--grad-primary);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:0.85rem;box-shadow:var(--glow-red-sm)">
        🚨</div>
      <span style="font-family:'Space Grotesk',sans-serif">ResQNet <span
          style="color:var(--accent-red)">Live</span></span>
    </div>

    <!-- Search -->
    <div class="map-search-wrap">
      <span class="map-search-icon">🔍</span>
      <input type="text" id="map-search-input" class="map-search-input" placeholder="Search places, addresses..."
        autocomplete="off">
      <div id="map-search-results" class="map-search-results"></div>
    </div>

    <!-- Filter Chips -->
    <div class="map-filters" id="map-filters-bar">
      <button class="map-filter-chip active" onclick="applyMapFilter('All')">All</button>
      <button class="map-filter-chip" onclick="applyMapFilter('High')">🔴 High</button>
      <button class="map-filter-chip" onclick="applyMapFilter('Medium')">🟡 Medium</button>
      <button class="map-filter-chip" onclick="applyMapFilter('Low')">🟢 Low</button>
      <button class="map-filter-chip" onclick="applyMapFilter('Volunteers')">👥 Volunteers</button>
      <button class="map-filter-chip" onclick="applyMapFilter('Disasters')">⚠️ Disasters</button>
    </div>

    <!-- Back Link -->
    <a href="javascript:history.back()" class="map-back-link">← Back</a>
  </div>

  <!-- Stats Pills (left) -->
  <div class="map-stats">
    <div class="map-stat-pill">
      <span
        style="width:8px;height:8px;border-radius:50%;background:var(--accent-red);box-shadow:0 0 6px var(--accent-red);flex-shrink:0;animation:pulseRed 1.5s infinite"></span>
      <span><strong id="high-count">0</strong> High Priority</span>
    </div>
    <div class="map-stat-pill">
      <span
        style="width:8px;height:8px;border-radius:50%;background:var(--accent-amber);box-shadow:0 0 6px var(--accent-amber);flex-shrink:0"></span>
      <span><strong id="medium-count">0</strong> Medium Priority</span>
    </div>
    <div class="map-stat-pill">
      <span
        style="width:8px;height:8px;border-radius:50%;background:var(--accent-green);box-shadow:0 0 6px var(--accent-green);flex-shrink:0"></span>
      <span><strong id="vol-count">0</strong> Volunteers Active</span>
    </div>
    <div class="map-stat-pill">
      <span
        style="width:8px;height:8px;border-radius:50%;background:var(--accent-blue);box-shadow:0 0 6px var(--accent-blue);flex-shrink:0;animation:pulseRed 1.5s infinite"></span>
      <span><strong id="live-count">0</strong> Live Incidents</span>
    </div>
  </div>

  <!-- Legend (right) -->
  <div class="map-legend">
    <div class="legend-title">Map Legend</div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent-red);box-shadow:0 0 5px var(--accent-red)"></div> High
      Priority
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent-amber);box-shadow:0 0 5px var(--accent-amber)"></div>
      Medium Priority
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent-green);box-shadow:0 0 5px var(--accent-green)"></div> Low
      Priority
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#F97316;box-shadow:0 0 5px #F97316"></div> Disaster Report
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--accent-blue);box-shadow:0 0 5px var(--accent-blue)"></div>
      Volunteer
    </div>
    <div
      style="border-top:1px solid var(--border-subtle);margin-top:10px;padding-top:10px;font-size:0.72rem;color:var(--text-muted)">
      Click any marker for details
    </div>
  </div>

  <!-- Empty State -->
  <div id="map-empty-state"
    style="display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:1000;background:rgba(13,22,39,0.96);padding:20px 28px;border-radius:var(--radius);border:1px solid var(--border-subtle);color:var(--text-secondary);text-align:center;font-weight:600;backdrop-filter:blur(12px)">
    No active incidents currently reported.
  </div>

  <div id="toast-container"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/leaflet-map.js"></script>
  <script>
    /* ── Map State ── */
    let map;
    const layers = {
      requests: null,
      volunteers: null,
      disasters: null,
    };

    /* ── Init ── */
    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(location.search);
      const centerLat = parseFloat(params.get('lat')) || 17.4401;
      const centerLng = parseFloat(params.get('lng')) || 78.4487;
      const zoom = params.get('lat') ? 15 : 12;

      map = ResQMap.createMap('map', { lat: centerLat, lng: centerLng, zoom });

      ResQMap.attachSearchBar(map, 'map-search-input', 'map-search-results', (lat, lng) => {
        map.setView([lat, lng], 15);
      });

      await loadMapData();
      setInterval(loadMapData, 15_000);

      loadRiskZones(map);
      addNgoDepotMarkers(map);
    });

    let currentMapFilter = 'All';

    window.applyMapFilter = function (filter) {
      currentMapFilter = filter;
      window._filterJustChanged = true;
      document.querySelectorAll('.map-filter-chip').forEach(btn => {
        btn.classList.toggle('active', btn.innerText.includes(filter) || (filter === 'All' && btn.innerText === 'All'));
      });
      loadMapData();
    };

    /* ── Load and Render Live Data ── */
    async function loadMapData() {
      let data = { requests: [], volunteers: [], reports: [] };
      try {
        data = await Api.get('/map/data');
      } catch (err) {
        console.warn('Failed to fetch map data:', err);
      }

      Object.values(layers).forEach(l => l && map.removeLayer(l));

      let totalVisibleMarkers = 0;
      const renderedMarkers = [];

      // ── Help Requests ──
      const reqCluster = ResQMap.createClusterGroup() || L.layerGroup();
      let highCount = 0, medCount = 0;

      (data.requests || []).forEach(r => {
        const priority = r.priority_level || 'Medium';
        const color = ResQMap.priorityColor(priority);
        const icon = priority === 'High' ? ResQMap.pulseIcon(color) : ResQMap.circleIcon(color);
        if (priority === 'High') highCount++;
        else if (priority === 'Medium') medCount++;

        if (currentMapFilter !== 'All' && currentMapFilter !== priority && !['High', 'Medium', 'Low'].includes(currentMapFilter)) {
          if (!['All', 'High', 'Medium', 'Low'].includes(currentMapFilter)) return;
        }
        if (['High', 'Medium', 'Low'].includes(currentMapFilter) && priority !== currentMapFilter) return;

        totalVisibleMarkers++;

        const timestamp = new Date(r.created_at).toLocaleString();

        const popup = ResQMap.popupHtml(`
      <div style="font-weight:700;font-size:0.95rem;margin-bottom:6px">
        ${r.request_type} <span style="font-size:0.75rem;color:${color}">(${priority})</span>
      </div>
      <div style="margin-bottom:4px">👥 ${r.number_of_people} people</div>
      <div style="margin-bottom:4px">📍 ${parseFloat(r.latitude).toFixed(4)}, ${parseFloat(r.longitude).toFixed(4)}</div>
      <div style="margin-bottom:4px;font-size:0.78rem">🕒 ${timestamp}</div>
      <div style="margin-bottom:8px;color:#9ca3af;font-size:0.78rem">${r.description || ''}</div>
      <div style="font-size:0.78rem">Status: <strong style="color:${color}">${r.status}</strong></div>
    `);

        const marker = L.marker([parseFloat(r.latitude), parseFloat(r.longitude)], { icon })
          .bindPopup(popup)
          .addTo(reqCluster);
        renderedMarkers.push(marker);

        const params = new URLSearchParams(location.search);
        if (params.get('request_id') == r.request_id) {
          window._foundTargetMarker = true;
          setTimeout(() => {
            reqCluster.zoomToShowLayer(marker, () => { marker.openPopup(); });
          }, 500);
        }
      });

      document.getElementById('high-count').textContent = highCount;
      document.getElementById('medium-count').textContent = medCount;

      const totalVols = data.total_volunteers ?? (data.volunteers || []).length;
      document.getElementById('vol-count').textContent = totalVols;

      const liveCount = data.total_active ?? ((data.requests || []).length + (data.reports || []).length);
      const liveEl = document.getElementById('live-count');
      if (liveEl) liveEl.textContent = liveCount;

      // ── Volunteers ──
      const volLayer = L.layerGroup();

      (data.volunteers || []).forEach(v => {
        const lat = parseFloat(v.last_location_lat);
        const lng = parseFloat(v.last_location_lng);
        if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;

        if (currentMapFilter !== 'All' && currentMapFilter !== 'Volunteers') return;

        totalVisibleMarkers++;

        const isAvail = v.availability_status === 'available';
        const color = '#3B82F6';
        const popup = ResQMap.popupHtml(`
      <div style="font-weight:700;margin-bottom:6px">🤝 ${v.user_name || 'Volunteer #' + v.volunteer_id}</div>
      <div style="font-size:0.8rem;margin-bottom:4px">📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
      <div style="font-weight:600;color:${isAvail ? '#3B82F6' : '#6B7280'};font-size:0.8rem">
        ${isAvail ? '✅' : '⚠️'} ${v.availability_status}
      </div>
    `);

        const marker = L.marker([lat, lng], { icon: ResQMap.circleIcon(color) })
          .bindPopup(popup)
          .addTo(volLayer);
        renderedMarkers.push(marker);
      });

      // ── Disaster Reports ──
      const disLayer = L.layerGroup();
      (data.reports || []).forEach(rep => {
        if (!rep.latitude || !rep.longitude) return;

        if (currentMapFilter !== 'All' && currentMapFilter !== 'Disasters') return;

        totalVisibleMarkers++;
        const color = '#F97316';

        const popup = ResQMap.popupHtml(`
      <div style="font-weight:700;font-size:0.95rem;margin-bottom:6px;color:#F97316">
        🔥 ${rep.disaster_type}
      </div>
      <div style="margin-bottom:4px">📍 ${parseFloat(rep.latitude).toFixed(4)}, ${parseFloat(rep.longitude).toFixed(4)}</div>
      <div style="margin-bottom:4px;font-size:0.8rem;color:#E5E7EB;border-left:2px solid #F97316;padding-left:6px">
        <strong>AI Analysis:</strong> ${rep.predicted_disaster_type || 'Unknown'} <span style="color:#9CA3AF">(${(rep.prediction_confidence !== null && rep.prediction_confidence !== undefined) ? rep.prediction_confidence + '%' : 'N/A'})</span>
      </div>
      <div style="font-size:0.8rem;color:#9CA3AF">${rep.description || ''}</div>
    `);

        const marker = L.marker([parseFloat(rep.latitude), parseFloat(rep.longitude)], { icon: ResQMap.circleIcon(color) })
          .bindPopup(popup)
          .addTo(disLayer);
        renderedMarkers.push(marker);

        const params = new URLSearchParams(location.search);
        if (params.get('report_id') == rep.report_id) {
          window._foundTargetMarker = true;
          setTimeout(() => {
            map.setView([parseFloat(rep.latitude), parseFloat(rep.longitude)], 16);
            marker.openPopup();
          }, 500);
        }
      });

      reqCluster.addTo(map);
      volLayer.addTo(map);
      disLayer.addTo(map);

      layers.requests = reqCluster;
      layers.volunteers = volLayer;
      layers.disasters = disLayer;

      const emptyState = document.getElementById('map-empty-state');
      if (emptyState) {
        emptyState.style.display = totalVisibleMarkers === 0 ? 'block' : 'none';
      }

      const params = new URLSearchParams(location.search);
      if ((params.get('report_id') || params.get('request_id')) && !window._foundTargetMarker) {
        if (typeof Toast !== 'undefined') {
          Toast.show('Error: Could not find the specified location on the live map.', 'danger');
        }
      }

      if (window._filterJustChanged) {
        window._filterJustChanged = false;
        if (renderedMarkers.length > 0) {
          const group = new L.featureGroup(renderedMarkers);
          map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 15 });
        }
      }
    }
  </script>

</body>

</html>
