<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResQNet — Live Disaster Map</title>
  <meta name="description" content="Live interactive map showing disaster locations, help requests, and volunteer positions.">

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <!-- Marker Cluster CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">

  <style>
    body, html { margin: 0; padding: 0; height: 100dvh; overflow: hidden; }

    #map { position: absolute; inset: 0; z-index: 1; }

    /* Map overlay UI */
    .map-topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 500;
      background: rgba(10,14,26,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-glass);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    /* Search bar */
    .map-search-wrap {
      position: relative;
      flex-shrink: 0;
      width: 260px;
    }
    .map-search-input {
      width: 100%;
      padding: 7px 14px 7px 36px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-glass);
      border-radius: 20px;
      color: var(--text-primary);
      font-size: 0.82rem;
      outline: none;
    }
    .map-search-input:focus { border-color: var(--primary); }
    .map-search-input::placeholder { color: var(--text-muted); }
    .map-search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: var(--text-muted);
      pointer-events: none;
    }
    .map-search-results {
      display: none;
      position: absolute;
      top: calc(100% + 6px); left: 0; right: 0;
      background: #1f2937;
      border: 1px solid rgba(255,75,43,0.2);
      border-radius: 10px;
      z-index: 1000;
      max-height: 220px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    }

    .map-legend {
      position: fixed;
      bottom: 40px; right: 20px;
      z-index: 500;
      background: rgba(17,24,39,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 18px 20px;
      min-width: 210px;
    }

    .map-stats {
      position: fixed;
      top: 80px; left: 20px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .map-stat-pill {
      background: rgba(17,24,39,0.95);
      backdrop-filter: blur(16px);
      border: 1px solid var(--border-glass);
      border-radius: 30px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-secondary);
    }
    .map-stat-pill strong { color: var(--text-primary); }

    /* Click-to-pick hint */
    .map-pick-hint {
      position: fixed;
      bottom: 40px; left: 50%; transform: translateX(-50%);
      z-index: 500;
      background: rgba(17,24,39,0.92);
      border: 1px solid rgba(255,75,43,0.3);
      border-radius: 24px;
      padding: 10px 20px;
      font-size: 0.82rem;
      color: var(--text-secondary);
      pointer-events: none;
      display: none;
    }

    .legend-title { font-size: 0.78rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 12px; }
    .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 0.82rem; color: var(--text-secondary); }
    .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

    /* Filter chips */
    .map-filter-chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border-glass);
      background: var(--bg-glass);
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition-sm);
      white-space: nowrap;
    }
    .map-filter-chip:hover { border-color: var(--primary); color: var(--primary); }
    .map-filter-chip.active { background: rgba(255,75,43,0.15); border-color: var(--primary); color: var(--primary); font-weight: 600; }

    @media (max-width: 640px) {
      .map-stats { display: none; }
      .map-legend { bottom: 10px; right: 10px; min-width: 150px; padding: 12px; }
      .map-search-wrap { width: 100%; margin-top: 8px; }
      .map-topbar { padding: 10px; }
      .map-filters { width: 100%; overflow-x: auto; padding-bottom: 4px; white-space: nowrap; flex-wrap: nowrap; }
    }

    @keyframes ripple { 0% { transform:scale(0); opacity:0.8; } 100% { transform:scale(4); opacity:0; } }
  </style>
</head>
<body>

<!-- Map Container -->
<div id="map"></div>

<!-- Top Bar -->
<div class="map-topbar">
  <div style="font-weight:700;font-size:1.1rem;letter-spacing:-0.02em;display:flex;align-items:center;gap:10px">
    <div style="width:28px;height:28px;background:var(--grad-primary);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.9rem">R</div>
    ResQNet Live
  </div>
  
  <div class="map-search-wrap">
    <span class="map-search-icon">🔍</span>
    <input type="text" id="map-search-input" class="map-search-input" placeholder="Search places, addresses..." autocomplete="off">
    <div id="map-search-results" class="map-search-results"></div>
  </div>

  <!-- Map Filters -->
  <div class="map-filters" style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-left:auto">
    <button class="map-filter-chip active" onclick="applyMapFilter('All')">All</button>
    <button class="map-filter-chip" onclick="applyMapFilter('High')">High</button>
    <button class="map-filter-chip" onclick="applyMapFilter('Medium')">Medium</button>
    <button class="map-filter-chip" onclick="applyMapFilter('Low')">Low</button>
    <button class="map-filter-chip" onclick="applyMapFilter('Volunteers')">Volunteers</button>
    <button class="map-filter-chip" onclick="applyMapFilter('Disasters')">Disasters</button>
  </div>
</div>

<div id="map-empty-state" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:1000; background:rgba(17,24,39,0.9); padding:20px 30px; border-radius:var(--radius-lg); border:1px solid var(--border-glass); color:var(--text-secondary); text-align:center; font-weight:600">
  No active incidents currently reported.
</div>

<!-- Stats Pills -->
<div class="map-stats">
  <div class="map-stat-pill">
    <span style="width:8px;height:8px;border-radius:50%;background:#EF4444;box-shadow:0 0 6px #EF4444;flex-shrink:0"></span>
    <span><strong id="high-count">0</strong> High Priority</span>
  </div>
  <div class="map-stat-pill">
    <span style="width:8px;height:8px;border-radius:50%;background:#F59E0B;box-shadow:0 0 6px #F59E0B;flex-shrink:0"></span>
    <span><strong id="medium-count">0</strong> Medium Priority</span>
  </div>
  <div class="map-stat-pill">
    <span style="width:8px;height:8px;border-radius:50%;background:#10B981;box-shadow:0 0 6px #10B981;flex-shrink:0"></span>
    <span><strong id="vol-count">0</strong> Volunteers Active</span>
  </div>
  <div class="map-stat-pill">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--primary);animation:pulse 1.5s infinite;flex-shrink:0"></span>
    <span><strong id="live-count">0</strong> Live Incidents</span>
  </div>
</div>

<!-- Legend -->
<div class="map-legend">
  <div class="legend-title">Map Legend</div>
  <div class="legend-item"><div class="legend-dot" style="background:#EF4444;box-shadow:0 0 6px #EF4444"></div> High Priority Request</div>
  <div class="legend-item"><div class="legend-dot" style="background:#F59E0B;box-shadow:0 0 6px #F59E0B"></div> Medium Priority Request</div>
  <div class="legend-item"><div class="legend-dot" style="background:#10B981;box-shadow:0 0 6px #10B981"></div> Low Priority Request</div>
  <div class="legend-item"><div class="legend-dot" style="background:#3B82F6;box-shadow:0 0 6px #3B82F6"></div> Disaster Report Zone</div>
  <div class="legend-item"><div class="legend-dot" style="background:#8B5CF6;box-shadow:0 0 6px #8B5CF6"></div> Volunteer Location</div>
  <div style="border-top:1px solid var(--border-glass);margin-top:12px;padding-top:12px;font-size:0.75rem;color:var(--text-muted)">
    Click any marker for details
  </div>
</div>

<div id="toast-container"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/leaflet-map.js"></script>
<script>
/* ── Map State ── */
let map;
const layers = {
  requests:   null,
  volunteers: null,
  disasters:  null,
};

/* ── Init ── */
window.addEventListener('DOMContentLoaded', async () => {
  const params    = new URLSearchParams(location.search);
  const centerLat = parseFloat(params.get('lat')) || 17.4401;
  const centerLng = parseFloat(params.get('lng')) || 78.4487;
  const zoom      = params.get('lat') ? 15 : 12;

  map = ResQMap.createMap('map', { lat: centerLat, lng: centerLng, zoom });

  ResQMap.attachSearchBar(map, 'map-search-input', 'map-search-results', (lat, lng) => {
    map.setView([lat, lng], 15);
  });

  await loadMapData();
  setInterval(loadMapData, 15_000);
});

let currentMapFilter = 'All';

window.applyMapFilter = function(filter) {
  currentMapFilter = filter;
  window._filterJustChanged = true;
  document.querySelectorAll('.map-filter-chip').forEach(btn => {
    if (btn.innerText === filter) btn.classList.add('active');
    else btn.classList.remove('active');
  });
  loadMapData();
};

/* ── Load and Render Live Data ── */
async function loadMapData() {
  let data = { requests: [], volunteers: [], reports: [] };
  try {
    data = await Api.get('/map/data');
  } catch (err) {
    console.warn('Failed to fetch map data:', err);
  }

  Object.values(layers).forEach(l => l && map.removeLayer(l));

  let totalVisibleMarkers = 0;
  const renderedMarkers = [];

  // ── Help Requests ──
  const reqCluster = ResQMap.createClusterGroup() || L.layerGroup();
  let highCount = 0, medCount = 0;

  (data.requests || []).forEach(r => {
    const priority = r.priority_level || 'Medium';
    const color    = ResQMap.priorityColor(priority);
    const icon     = priority === 'High' ? ResQMap.pulseIcon(color) : ResQMap.circleIcon(color);
    if (priority === 'High') highCount++;
    else if (priority === 'Medium') medCount++;

    if (currentMapFilter !== 'All' && currentMapFilter !== priority && !['High','Medium','Low'].includes(currentMapFilter)) {
      if (!['All', 'High', 'Medium', 'Low'].includes(currentMapFilter)) return;
    }
    if (['High', 'Medium', 'Low'].includes(currentMapFilter) && priority !== currentMapFilter) return;

    totalVisibleMarkers++;

    const timestamp = new Date(r.created_at).toLocaleString();

    const popup = ResQMap.popupHtml(`
      <div style="font-weight:700;font-size:0.95rem;margin-bottom:6px">
        ${r.request_type} <span style="font-size:0.75rem;color:${color}">(${priority})</span>
      </div>
      <div style="margin-bottom:4px">👥 ${r.number_of_people} people</div>
      <div style="margin-bottom:4px">📍 ${parseFloat(r.latitude).toFixed(4)}, ${parseFloat(r.longitude).toFixed(4)}</div>
      <div style="margin-bottom:4px;font-size:0.78rem">🕒 ${timestamp}</div>
      <div style="margin-bottom:8px;color:#9ca3af;font-size:0.78rem">${r.description || ''}</div>
      <div style="font-size:0.78rem">Status: <strong style="color:${color}">${r.status}</strong></div>
    `);

    const marker = L.marker([parseFloat(r.latitude), parseFloat(r.longitude)], { icon })
      .bindPopup(popup)
      .addTo(reqCluster);
    renderedMarkers.push(marker);

    const params = new URLSearchParams(location.search);
    if (params.get('request_id') == r.request_id) {
      window._foundTargetMarker = true;
      setTimeout(() => {
        reqCluster.zoomToShowLayer(marker, () => {
          marker.openPopup();
        });
      }, 500);
    }
  });

  // Update all stat pills from API data
  // High & Medium are counted from requests array above
  document.getElementById('high-count').textContent   = highCount;
  document.getElementById('medium-count').textContent = medCount;

  // Volunteers Active = total registered volunteers (from API, not just GPS-mapped)
  const totalVols = data.total_volunteers ?? (data.volunteers || []).length;
  document.getElementById('vol-count').textContent = totalVols;

  // Live Incidents = total active incidents (requests + recent reports)
  const liveCount = data.total_active ?? ((data.requests || []).length + (data.reports || []).length);
  const liveEl = document.getElementById('live-count');
  if (liveEl) liveEl.textContent = liveCount;

  // ── Volunteers ──
  const volLayer = L.layerGroup();
  let volMapCount = 0;  // only those with GPS for the map markers

  (data.volunteers || []).forEach(v => {
    const lat = parseFloat(v.last_location_lat);
    const lng = parseFloat(v.last_location_lng);
    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;
    volMapCount++;

    if (currentMapFilter !== 'All' && currentMapFilter !== 'Volunteers') return;

    totalVisibleMarkers++;

    const isAvail = v.availability_status === 'available';
    const color   = '#3B82F6';
    const popup   = ResQMap.popupHtml(`
      <div style="font-weight:700;margin-bottom:6px">🤝 ${v.user_name || 'Volunteer #' + v.volunteer_id}</div>
      <div style="font-size:0.8rem;margin-bottom:4px">📍 ${lat.toFixed(4)}, ${lng.toFixed(4)}</div>
      <div style="font-weight:600;color:${isAvail ? '#3B82F6' : '#6B7280'};font-size:0.8rem">
        ${isAvail ? '✅' : '⚠️'} ${v.availability_status}
      </div>
    `);

    const marker = L.marker([lat, lng], { icon: ResQMap.circleIcon(color) })
      .bindPopup(popup)
      .addTo(volLayer);
    renderedMarkers.push(marker);
  });

  // ── Disaster Reports ──
  const disLayer = L.layerGroup();
  (data.reports || []).forEach(rep => {
    if (!rep.latitude || !rep.longitude) return;

    if (currentMapFilter !== 'All' && currentMapFilter !== 'Disasters') return;

    totalVisibleMarkers++;
    const color = '#F97316'; // strictly Orange for Disasters

    const popup = ResQMap.popupHtml(`
      <div style="font-weight:700;font-size:0.95rem;margin-bottom:6px;color:#F97316">
        🔥 ${rep.disaster_type}
      </div>
      <div style="margin-bottom:4px">📍 ${parseFloat(rep.latitude).toFixed(4)}, ${parseFloat(rep.longitude).toFixed(4)}</div>
      <div style="margin-bottom:4px;font-size:0.8rem;color:#E5E7EB;border-left:2px solid #F97316;padding-left:6px">
        <strong>AI Analysis:</strong> ${rep.predicted_disaster_type || 'Unknown'} <span style="color:#9CA3AF">(${(rep.prediction_confidence !== null && rep.prediction_confidence !== undefined) ? rep.prediction_confidence + '%' : 'N/A'})</span>
      </div>
      <div style="font-size:0.8rem;color:#9CA3AF">${rep.description || ''}</div>
    `);

    const marker = L.marker([parseFloat(rep.latitude), parseFloat(rep.longitude)], { icon: ResQMap.circleIcon(color) })
      .bindPopup(popup)
      .addTo(disLayer);
    renderedMarkers.push(marker);
      
    const params = new URLSearchParams(location.search);
    if (params.get('report_id') == rep.report_id) {
      window._foundTargetMarker = true;
      setTimeout(() => {
        map.setView([parseFloat(rep.latitude), parseFloat(rep.longitude)], 16);
        marker.openPopup();
      }, 500);
    }
  });

  reqCluster.addTo(map);
  volLayer.addTo(map);
  disLayer.addTo(map);

  layers.requests   = reqCluster;
  layers.volunteers = volLayer;
  layers.disasters  = disLayer;

  const emptyState = document.getElementById('map-empty-state');
  if (emptyState) {
    if (totalVisibleMarkers === 0) emptyState.style.display = 'block';
    else emptyState.style.display = 'none';
  }

  const params = new URLSearchParams(location.search);
  if ((params.get('report_id') || params.get('request_id')) && !window._foundTargetMarker) {
    if (typeof Toast !== 'undefined') {
      Toast.show('Error: Could not find the specified location on the live map.', 'danger');
    }
  }

  if (window._filterJustChanged) {
    window._filterJustChanged = false;
    if (renderedMarkers.length > 0) {
      const group = new L.featureGroup(renderedMarkers);
      map.fitBounds(group.getBounds(), { padding: [50, 50], maxZoom: 15 });
    }
  }
}
</script>

</body>
</html>
